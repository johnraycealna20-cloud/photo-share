<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoShare</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f5a623;
  --gold-dark: #d4891a;
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --text: #f0f0f0;
  --muted: #888;
  --danger: #e74c3c;
  --success: #2ecc71;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* ── AUTH SCREEN ─────────────────────────────── */
#authScreen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 30% 20%, #1a1000 0%, var(--bg) 60%);
}
.auth-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo img { width: 64px; height: 64px; object-fit: contain; }
.auth-logo h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--gold); margin-top: 10px; }
.auth-logo p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
.auth-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
.auth-tab {
  flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.9rem;
  background: transparent; color: var(--muted); transition: all 0.2s;
}
.auth-tab.active { background: var(--gold); color: #000; font-weight: 700; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.form-group input {
  width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
  outline: none; transition: border-color 0.2s;
}
.form-group input:focus { border-color: var(--gold); }
.auth-btn {
  width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 10px;
  color: #000; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
  cursor: pointer; margin-top: 8px; transition: background 0.2s, transform 0.1s;
}
.auth-btn:hover { background: var(--gold-dark); }
.auth-btn:active { transform: scale(0.98); }
.auth-msg { text-align: center; font-size: 0.85rem; margin-top: 12px; min-height: 20px; }
.auth-msg.error { color: var(--danger); }
.auth-msg.success { color: var(--success); }

/* ── APP SHELL ───────────────────────────────── */
#app { display: none; flex-direction: column; min-height: 100vh; }

/* ── TOPBAR ──────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,15,15,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 24px; height: 60px;
}
.topbar-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.topbar-logo img { width: 32px; height: 32px; object-fit: contain; }
.topbar-logo span { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--gold); }
.topbar-nav { display: flex; gap: 4px; margin-left: 8px; }
.nav-btn {
  padding: 7px 16px; border: none; border-radius: 8px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
  background: transparent; color: var(--muted); transition: all 0.2s;
}
.nav-btn.active, .nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { color: var(--gold); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.user-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; background: var(--surface2); border-radius: 8px;
  font-size: 0.85rem; color: var(--muted);
}
.user-badge span { color: var(--text); font-weight: 500; }
.logout-btn {
  padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px;
  background: transparent; color: var(--muted); cursor: pointer; font-size: 0.82rem;
  font-family: 'DM Sans', sans-serif; transition: all 0.2s;
}
.logout-btn:hover { border-color: var(--danger); color: var(--danger); }

/* ── MAIN CONTENT ────────────────────────────── */
main { flex: 1; padding: 28px 24px; max-width: 1200px; margin: 0 auto; width: 100%; }

/* ── SECTIONS ────────────────────────────────── */
.section { display: none; }
.section.active { display: block; }

/* ── UPLOAD AREA ─────────────────────────────── */
.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 40px; text-align: center; cursor: pointer; margin-bottom: 28px;
  transition: all 0.25s; background: var(--surface);
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--gold); background: rgba(245,166,35,0.05); }
.upload-zone .icon { font-size: 36px; margin-bottom: 12px; }
.upload-zone h3 { font-family: 'Syne', sans-serif; margin-bottom: 6px; }
.upload-zone p { color: var(--muted); font-size: 0.88rem; }
input[type=file] { display: none; }
.upload-status { text-align: center; font-size: 0.88rem; color: var(--gold); min-height: 22px; margin-top: 8px; }

/* ── TOOLBAR ─────────────────────────────────── */
.toolbar {
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.toolbar-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; flex: 1; }
.view-btns { display: flex; gap: 4px; background: var(--surface); border-radius: 8px; padding: 4px; }
.view-btn {
  width: 34px; height: 34px; border: none; border-radius: 6px; cursor: pointer;
  background: transparent; color: var(--muted); display: flex; align-items: center;
  justify-content: center; font-size: 1rem; transition: all 0.15s;
}
.view-btn.active { background: var(--gold); color: #000; }

/* ── GALLERY VIEWS ───────────────────────────── */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}
.gallery-column {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 6px;
}
.gallery-row {
  display: flex; flex-direction: column; gap: 12px;
}
.gallery-list {
  display: flex; flex-direction: column; gap: 8px;
}

/* Photo card — grid/column */
.photo-card {
  position: relative; border-radius: 10px; overflow: hidden;
  background: var(--surface); aspect-ratio: 1; cursor: pointer;
  animation: fadeUp 0.3s ease both;
}
.photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
.photo-card:hover img { transform: scale(1.04); }
.photo-card .overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0); display: flex;
  align-items: flex-end; padding: 10px; opacity: 0; transition: all 0.25s;
}
.photo-card:hover .overlay { background: rgba(0,0,0,0.5); opacity: 1; }
.card-actions { display: flex; gap: 6px; margin-left: auto; }
.card-btn {
  width: 30px; height: 30px; border: none; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 0.85rem; transition: all 0.15s;
}
.card-btn.del { background: rgba(231,76,60,0.9); color: #fff; }
.card-btn.dl  { background: rgba(245,166,35,0.9); color: #000; }
.card-btn:hover { transform: scale(1.1); }

/* Photo card — row view (wide) */
.photo-row-card {
  display: flex; gap: 14px; align-items: center;
  background: var(--surface); border-radius: 10px; padding: 10px;
  cursor: pointer; animation: fadeUp 0.3s ease both; transition: background 0.2s;
}
.photo-row-card:hover { background: var(--surface2); }
.photo-row-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
.row-info { flex: 1; min-width: 0; }
.row-info .fname { font-weight: 500; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-info .fdate { color: var(--muted); font-size: 0.78rem; margin-top: 3px; }
.row-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* Photo card — list view */
.photo-list-card {
  display: flex; gap: 12px; align-items: center;
  background: var(--surface); border-radius: 8px; padding: 8px 12px;
  cursor: pointer; animation: fadeUp 0.3s ease both; transition: background 0.2s;
}
.photo-list-card:hover { background: var(--surface2); }
.list-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.list-name { flex: 1; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-date { color: var(--muted); font-size: 0.78rem; margin-right: 8px; white-space: nowrap; }
.list-actions { display: flex; gap: 5px; }

/* Group header */
.group-label {
  font-size: 0.78rem; font-weight: 600; color: var(--gold);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin: 20px 0 10px; padding-left: 4px; border-left: 3px solid var(--gold);
  padding-left: 10px;
}

/* ── PREVIEW MODAL ───────────────────────────── */
#previewModal {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
}
#previewModal.open { display: flex; }
.preview-inner { position: relative; max-width: 92vw; max-height: 90vh; }
#previewImg { max-width: 90vw; max-height: 85vh; border-radius: 10px; object-fit: contain; }
.preview-close {
  position: absolute; top: -14px; right: -14px;
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: var(--danger); color: #fff; font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.preview-dl {
  display: block; margin: 14px auto 0; padding: 10px 28px;
  background: var(--gold); border: none; border-radius: 8px; color: #000;
  font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; font-size: 0.9rem;
}

/* ── NOTES SECTION ───────────────────────────── */
.notes-layout { display: grid; grid-template-columns: 260px 1fr; gap: 20px; min-height: 500px; }
.notes-sidebar { background: var(--surface); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.notes-sidebar h3 { font-family: 'Syne', sans-serif; font-size: 0.95rem; margin-bottom: 4px; }
.new-note-btn {
  width: 100%; padding: 10px; background: var(--gold); border: none; border-radius: 8px;
  color: #000; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; font-size: 0.88rem;
}
.note-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.note-item {
  padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.15s;
  border: 1px solid transparent;
}
.note-item:hover { background: var(--surface2); }
.note-item.active { background: var(--surface2); border-color: var(--gold); }
.note-item-title { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-item-preview { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.note-editor { background: var(--surface); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.note-title-input {
  width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700;
  padding-bottom: 10px; outline: none;
}
.note-title-input::placeholder { color: var(--muted); }
.note-content-area {
  flex: 1; width: 100%; background: transparent; border: none; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.95rem; line-height: 1.7;
  resize: none; outline: none; min-height: 380px;
}
.note-content-area::placeholder { color: var(--muted); }
.note-actions { display: flex; gap: 8px; justify-content: flex-end; }
.note-save-btn {
  padding: 9px 22px; background: var(--gold); border: none; border-radius: 8px;
  color: #000; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; font-size: 0.85rem;
}
.note-del-btn {
  padding: 9px 22px; background: transparent; border: 1px solid var(--danger);
  border-radius: 8px; color: var(--danger); cursor: pointer; font-size: 0.85rem;
  font-family: 'DM Sans', sans-serif;
}
.note-copy-btn {
  padding: 9px 22px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); cursor: pointer; font-size: 0.85rem;
  font-family: 'DM Sans', sans-serif;
}
.note-placeholder { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--muted); font-size: 0.9rem; }

/* empty state */
.empty { text-align: center; color: var(--muted); padding: 60px 20px; }
.empty .e-icon { font-size: 48px; margin-bottom: 12px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 700px) {
  .topbar { padding: 0 14px; }
  main { padding: 16px 14px; }
  .notes-layout { grid-template-columns: 1fr; }
  .topbar-logo span { display: none; }
  .user-badge .label { display: none; }
}
</style>
</head>

<script>
// ── State ────────────────────────────────────────────────────
let token = localStorage.getItem('ps_token') || '';
let username = localStorage.getItem('ps_user') || '';
let photos = [];
let notes = [];
let currentView = 'grid';
let currentPhoto = null;
let currentNote = null;

// ── Auth ─────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
  setAuthMsg('','');
}
function setAuthMsg(msg, type) {
  const el = document.getElementById('authMsg');
  el.textContent = msg; el.className = 'auth-msg ' + type;
}
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (!u || !p) return setAuthMsg('Please fill in all fields','error');
  const res = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const data = await res.json();
  if (!res.ok) return setAuthMsg(data.error,'error');
  token = data.token; username = data.username;
  localStorage.setItem('ps_token', token);
  localStorage.setItem('ps_user', username);
  showApp();
}
async function doRegister() {
  const u = document.getElementById('regUser').value.trim();
  const p = document.getElementById('regPass').value;
  if (!u || !p) return setAuthMsg('Please fill in all fields','error');
  const res = await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const data = await res.json();
  if (!res.ok) return setAuthMsg(data.error,'error');
  setAuthMsg('Account created! Please log in.','success');
  switchTab('login');
  document.getElementById('loginUser').value = u;
}
async function doLogout() {
  await fetch('/api/logout',{method:'POST',headers:{'x-auth-token':token}});
  token=''; username='';
  localStorage.removeItem('ps_token'); localStorage.removeItem('ps_user');
  document.getElementById('app').style.display='none';
  document.getElementById('authScreen').style.display='flex';
}

// ── App shell ────────────────────────────────────────────────
function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('usernameDisplay').textContent = username;
  loadPhotos();
  loadNotes();
}
function showSection(sec) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(sec+'Section').classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── Photos ───────────────────────────────────────────────────
async function loadPhotos() {
  const res = await fetch('/api/photos',{headers:{'x-auth-token':token}});
  photos = await res.json();
  renderGallery();
}

async function uploadFiles(files) {
  const imgs = Array.from(files).filter(f=>f.type.startsWith('image/'));
  if (!imgs.length) return;
  const fd = new FormData();
  imgs.forEach(f=>fd.append('photos',f));
  document.getElementById('uploadStatus').textContent = `Uploading ${imgs.length} photo(s)...`;
  const res = await fetch('/api/upload',{method:'POST',headers:{'x-auth-token':token},body:fd});
  const data = await res.json();
  if (res.ok) {
    document.getElementById('uploadStatus').textContent = `✅ ${data.uploaded} photo(s) uploaded!`;
    await loadPhotos();
  } else {
    document.getElementById('uploadStatus').textContent = '❌ ' + data.error;
  }
  setTimeout(()=>document.getElementById('uploadStatus').textContent='', 3000);
}

document.getElementById('fileInput').addEventListener('change', e => uploadFiles(e.target.files));

// Drag & drop
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e=>{e.preventDefault();zone.classList.add('drag');});
zone.addEventListener('dragleave', ()=>zone.classList.remove('drag'));
zone.addEventListener('drop', e=>{e.preventDefault();zone.classList.remove('drag');uploadFiles(e.dataTransfer.files);});

function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach((b,i)=>b.classList.toggle('active',['grid','column','row','list'][i]===v));
  renderGallery();
}

function fmtDate(ts) {
  return new Date(ts).toLocaleString([],{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtGroup(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'})+' at '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function renderGallery() {
  const g = document.getElementById('gallery');
  g.innerHTML = '';
  document.getElementById('photoCount').textContent = `${photos.length} Photo${photos.length!==1?'s':''}`;
  if (!photos.length) { g.innerHTML='<div class="empty"><div class="e-icon">📷</div><p>No photos yet — upload some above!</p></div>'; return; }

  let lastGroup = null;
  let container = null;

  photos.forEach((p,i) => {
    const grp = fmtGroup(p.timestamp);
    if (grp !== lastGroup) {
      const lbl = document.createElement('div');
      lbl.className = 'group-label'; lbl.textContent = '📅 ' + grp;
      g.appendChild(lbl);
      container = document.createElement('div');
      container.className = currentView==='grid'?'gallery-grid':currentView==='column'?'gallery-column':currentView==='row'?'gallery-row':'gallery-list';
      g.appendChild(container);
      lastGroup = grp;
    }

    if (currentView==='row') {
      container.appendChild(makeRowCard(p));
    } else if (currentView==='list') {
      container.appendChild(makeListCard(p));
    } else {
      container.appendChild(makeGridCard(p));
    }
  });
}

function makeGridCard(p) {
  const d = document.createElement('div'); d.className='photo-card';
  d.innerHTML=`<img src="${p.src}" alt="${p.originalName}" loading="lazy">
    <div class="overlay">
      <div class="card-actions">
        <button class="card-btn dl" title="Download" onclick="downloadPhoto(event,'${p.src}','${p.originalName}')">⬇</button>
        <button class="card-btn del" title="Delete" onclick="deletePhoto(event,'${p.id}')">🗑</button>
      </div>
    </div>`;
  d.querySelector('img').addEventListener('click',()=>openPreview(p));
  return d;
}
function makeRowCard(p) {
  const d = document.createElement('div'); d.className='photo-row-card';
  d.innerHTML=`<img src="${p.src}" alt="${p.originalName}" loading="lazy">
    <div class="row-info"><div class="fname">${p.originalName}</div><div class="fdate">${fmtDate(p.timestamp)}</div></div>
    <div class="row-actions">
      <button class="card-btn dl" title="Download" onclick="downloadPhoto(event,'${p.src}','${p.originalName}')">⬇</button>
      <button class="card-btn del" title="Delete" onclick="deletePhoto(event,'${p.id}')">🗑</button>
    </div>`;
  d.querySelector('img').addEventListener('click',()=>openPreview(p));
  return d;
}
function makeListCard(p) {
  const d = document.createElement('div'); d.className='photo-list-card';
  d.innerHTML=`<img class="list-thumb" src="${p.src}" alt="${p.originalName}" loading="lazy">
    <span class="list-name">${p.originalName}</span>
    <span class="list-date">${fmtDate(p.timestamp)}</span>
    <div class="list-actions">
      <button class="card-btn dl" title="Download" onclick="downloadPhoto(event,'${p.src}','${p.originalName}')">⬇</button>
      <button class="card-btn del" title="Delete" onclick="deletePhoto(event,'${p.id}')">🗑</button>
    </div>`;
  d.querySelector('img').addEventListener('click',()=>openPreview(p));
  return d;
}

async function deletePhoto(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this photo?')) return;
  await fetch(`/api/photos/${id}`,{method:'DELETE',headers:{'x-auth-token':token}});
  await loadPhotos();
}
function downloadPhoto(e, src, name) {
  e.stopPropagation();
  const a = document.createElement('a'); a.href=src; a.download=name; a.click();
}

// ── Preview ──────────────────────────────────────────────────
function openPreview(p) {
  currentPhoto = p;
  document.getElementById('previewImg').src = p.src;
  document.getElementById('previewModal').classList.add('open');
}
function closePreview(e) { if (e.target===document.getElementById('previewModal')) closeModal(); }
function closeModal() { document.getElementById('previewModal').classList.remove('open'); currentPhoto=null; }
function downloadCurrent() { if (currentPhoto) downloadPhoto({stopPropagation:()=>{}}, currentPhoto.src, currentPhoto.originalName); }
document.addEventListener('keydown', e=>{ if (e.key==='Escape') closeModal(); });

// ── Notes ────────────────────────────────────────────────────
async function loadNotes() {
  const res = await fetch('/api/notes',{headers:{'x-auth-token':token}});
  notes = await res.json();
  renderNoteList();
}
function renderNoteList() {
  const list = document.getElementById('noteList');
  list.innerHTML = '';
  if (!notes.length) { list.innerHTML='<div style="color:var(--muted);font-size:0.82rem;padding:8px">No notes yet</div>'; return; }
  notes.forEach(n=>{
    const d = document.createElement('div'); d.className='note-item'+(currentNote&&currentNote.id===n.id?' active':'');
    d.innerHTML=`<div class="note-item-title">${n.title||'Untitled'}</div><div class="note-item-preview">${n.content.slice(0,60)}</div>`;
    d.onclick=()=>openNote(n);
    list.appendChild(d);
  });
}
function openNote(n) {
  currentNote = n;
  renderNoteList();
  const ed = document.getElementById('noteEditor');
  ed.innerHTML=`
    <input class="note-title-input" id="noteTitle" value="${n.title||''}" placeholder="Note title...">
    <textarea class="note-content-area" id="noteContent" placeholder="Start writing or paste your text here...">${n.content}</textarea>
    <div class="note-actions">
      <button class="note-copy-btn" onclick="copyNote()">📋 Copy</button>
      <button class="note-del-btn" onclick="deleteNote('${n.id}')">🗑 Delete</button>
      <button class="note-save-btn" onclick="saveNote('${n.id}')">💾 Save</button>
    </div>`;
}
function newNote() {
  currentNote = null;
  renderNoteList();
  const ed = document.getElementById('noteEditor');
  ed.innerHTML=`
    <input class="note-title-input" id="noteTitle" placeholder="Note title...">
    <textarea class="note-content-area" id="noteContent" placeholder="Start writing or paste your text here..."></textarea>
    <div class="note-actions">
      <button class="note-copy-btn" onclick="copyNote()">📋 Copy</button>
      <button class="note-save-btn" onclick="saveNote(null)">💾 Save</button>
    </div>`;
  document.getElementById('noteTitle').focus();
}
async function saveNote(id) {
  const title = document.getElementById('noteTitle').value.trim();
  const content = document.getElementById('noteContent').value;
  if (!content) return alert('Note is empty');
  const opts = {method:id?'PUT':'POST',headers:{'Content-Type':'application/json','x-auth-token':token},body:JSON.stringify({title,content})};
  const res = await fetch(id?`/api/notes/${id}`:'/api/notes', opts);
  const saved = await res.json();
  currentNote = saved;
  await loadNotes();
  openNote(saved);
}
async function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  await fetch(`/api/notes/${id}`,{method:'DELETE',headers:{'x-auth-token':token}});
  currentNote = null;
  await loadNotes();
  document.getElementById('noteEditor').innerHTML='<div class="note-placeholder">Select a note or create a new one</div>';
}
function copyNote() {
  const content = document.getElementById('noteContent')?.value;
  if (!content) return;
  navigator.clipboard.writeText(content).then(()=>alert('Copied to clipboard!'));
}

// ── Init ─────────────────────────────────────────────────────
if (token) {
  fetch('/api/me',{headers:{'x-auth-token':token}})
    .then(r=>r.ok?r.json():null)
    .then(d=>{ if(d){username=d.username;showApp();}else{token='';localStorage.removeItem('ps_token');} });
}
</script>
